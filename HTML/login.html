<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>

  <link rel="stylesheet" href="../css/style.css">

</head>

<body>

  <div class="top-bar">
    <div class="top-bar-left">
      <a href="javascript:history.back()" class="top-bar-back" title="Go Back">

          <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"></path>
        </svg>
      </a>
      <a href="index.html" class="top-bar-link">Home</a>
      <div class="top-bar-social" aria-label="Social links">
        <a href="#" class="top-bar-icon" title="Instagram" aria-label="Instagram">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path
              d="M7.75 2h8.5A5.75 5.75 0 0 1 22 7.75v8.5A5.75 5.75 0 0 1 16.25 22h-8.5A5.75 5.75 0 0 1 2 16.25v-8.5A5.75 5.75 0 0 1 7.75 2Zm0 2A3.75 3.75 0 0 0 4 7.75v8.5A3.75 3.75 0 0 0 7.75 20h8.5A3.75 3.75 0 0 0 20 16.25v-8.5A3.75 3.75 0 0 0 16.25 4h-8.5ZM12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10Zm0 2a3 3 0 1 0 0 6 3 3 0 0 0 0-6Zm5.75-.9a1.15 1.15 0 1 1 0 2.3 1.15 1.15 0 0 1 0-2.3Z" />
          </svg>
        </a>
        <a href="#" class="top-bar-icon" title="Twitter" aria-label="Twitter">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path
              d="M18.9 2h3.1l-6.77 7.74L23 22h-6.2l-4.86-6.27L6.45 22H3.3l7.24-8.27L1 2h6.35l4.39 5.57L18.9 2Zm-1.09 18h1.72L6.41 3.9H4.57L17.81 20Z" />
          </svg>
        </a>
        <a href="#" class="top-bar-icon" title="YouTube" aria-label="YouTube">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path
              d="M21.6 7.2a3 3 0 0 0-2.1-2.1C17.6 4.5 12 4.5 12 4.5s-5.6 0-7.5.6A3 3 0 0 0 2.4 7.2 31.5 31.5 0 0 0 2 12a31.5 31.5 0 0 0 .4 4.8 3 3 0 0 0 2.1 2.1c1.9.6 7.5.6 7.5.6s5.6 0 7.5-.6a3 3 0 0 0 2.1-2.1A31.5 31.5 0 0 0 22 12a31.5 31.5 0 0 0-.4-4.8ZM10 15.5v-7l6 3.5-6 3.5Z" />
          </svg>
        </a>
        <a href="#" class="top-bar-icon" title="Facebook" aria-label="Facebook">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path
              d="M13.5 22v-8h2.7l.4-3h-3.1V9.1c0-.9.3-1.5 1.6-1.5h1.7V5c-.8-.1-1.7-.2-2.6-.2-2.6 0-4.4 1.6-4.4 4.5V11H7v3h2.8v8h3.7Z" />
          </svg>
        </a>
      </div>
    </div>
    <div class="top-bar-right">
      <a href="register.html" class="top-bar-link top-bar-link--primary">Sign Up</a>
    </div>
  </div>

  <main class="auth-page">
    <section class="auth-card" aria-label="Login form">
      <div style="text-align: center; margin-bottom: 15px;">
        <img src="hand.jpeg" alt="Donate hands" style="width: 80px; height: 80px; object-fit: contain;">
      </div>
      <h2 class="auth-title">Welcome back</h2>
      <p class="auth-subtitle">Log in to continue to Community Care.</p>

      <div id="authMessage" class="auth-message" role="status" aria-live="polite"></div>

      <form class="auth-form" onsubmit="loginUser(event)">
        <label class="field">
          <span>Full Name</span>
          <input id="userName" type="text" placeholder="John Doe" required>
        </label>

        <label class="field">
          <span>Email</span>
          <input id="email" type="email" placeholder="you@example.com" autocomplete="email" required>
        </label>

        <label class="field">
          <span>Password</span>
          <div class="password-field">
            <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" required>
            <button class="toggle-password" type="button" aria-label="Show password"
              onclick="togglePassword()">Show</button>
          </div>
        </label>

        <label class="checkbox">
          <input type="checkbox" id="terms" required>
          I agree to the terms and conditions
        </label>

        <button id="loginBtn" type="submit" class="btn btn--green btn--full">Login</button>

        <p class="auth-alt">
          Don’t have an account? <a href="register.html">Sign up</a>
          <br>
          <a href="#" onclick="logoutUser(event)"
            style="font-size: 12px; color: #999; margin-top: 10px; display: inline-block; text-decoration: none;">Log
            out of current session</a>
        </p>
      </form>
    </section>
  </main>

  <script type="module">
    import { signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { auth, db } from "../js/firebase-init.js";

    function setMessage(text, type) {
      const el = document.getElementById("authMessage");
      if (!el) return;
      el.textContent = text || "";
      el.classList.remove("is-error", "is-success");
      if (type) el.classList.add(type === "error" ? "is-error" : "is-success");
    }

    window.loginUser = async function (event) {
      if (event?.preventDefault) event.preventDefault();
      setMessage("", null);

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const btn = document.getElementById("loginBtn");

      if (btn) { btn.disabled = true; btn.textContent = "Logging in..."; }

      try {
        const cred = await signInWithEmailAndPassword(auth, email, password);

        // 💾 Save login activity to Firestore
        await addDoc(collection(db, "loginActivity"), {
          uid: cred.user.uid,
          email: cred.user.email,
          displayName: cred.user.displayName || "",
          loginAt: new Date(),
          userAgent: navigator.userAgent
        });

        setMessage("Login successful. Redirecting…", "success");
        window.location.href = "dashboard.html";
      } catch (err) {
        setMessage(err.message, "error");
      } finally {
        if (btn) { btn.disabled = false; btn.textContent = "Login"; }
      }
    }

    window.logoutUser = async function (event) {
      if (event?.preventDefault) event.preventDefault();
      if (!confirm("Are you sure you want to log out?")) return;

      try {
        await signOut(auth);
        setMessage("Successfully logged out.", "success");
      } catch (err) {
        setMessage("Logout failed: " + err.message, "error");
      }
    }

    window.togglePassword = function () {
      const input = document.getElementById("password");
      const btn = document.querySelector(".toggle-password");
      const show = input.type === "password";
      input.type = show ? "text" : "password";
      if (btn) {
        btn.textContent = show ? "Hide" : "Show";
        btn.setAttribute("aria-label", show ? "Hide password" : "Show password");
      }
    }
  </script>
</body>

</html>
