<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Address Details - Community Care</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body {
            background: #f4f6f8;
        }

        .header-bar {
            background: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-btn {
            background: none;
            border: none;
            padding: 5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .back-btn svg {
            width: 24px;
            height: 24px;
            fill: #333;
        }

        .header-title {
            font-size: 18px;
            font-weight: 700;
            color: #222;
        }

        .map-preview-card {
            background: white;
            padding: 15px 20px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            border-bottom: 8px solid #f4f6f8;
        }

        .map-icon {
            font-size: 24px;
            background: #e8f5e9;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            flex-shrink: 0;
            color: #2e7d32;
        }

        .map-address-text {
            font-size: 14px;
            color: #333;
            font-weight: 600;
            line-height: 1.4;
            margin-top: 2px;
        }

        .details-container {
            padding: 20px;
            background: white;
            padding-bottom: 100px;
            /* Space for footer */
        }

        .field-group {
            margin-bottom: 25px;
        }

        .field-label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .input-box {
            width: 100%;
            padding: 14px 15px;
            border: 1.5px solid #eaeaea;
            border-radius: 12px;
            font-size: 15px;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s;
            background: #fafafa;
        }

        .input-box:focus {
            border-color: #2e7d32;
            background: white;
            box-shadow: 0 0 0 4px rgba(46, 125, 50, 0.1);
        }

        .row-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        /* Label Buttons */
        .chip-group {
            display: flex;
            gap: 10px;
        }

        .chip-btn {
            flex: 1;
            padding: 12px 10px;
            background: white;
            border: 1.5px solid #eaeaea;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            color: #555;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .chip-btn.active {
            border-color: #2e7d32;
            background: #e8f5e9;
            color: #2e7d32;
        }

        /* Image Upload */
        .image-upload-box {
            border: 2px dashed #ccc;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            background: #fafafa;
            transition: all 0.2s;
        }

        .image-upload-box:hover {
            border-color: #2e7d32;
            background: #f1f8e9;
        }

        #image-preview {
            display: none;
            width: 100%;
            height: 140px;
            object-fit: cover;
            border-radius: 12px;
            margin-top: 10px;
        }

        /* Footer Action */
        .footer-action {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 15px 20px;
            background: white;
            box-shadow: 0 -4px 15px rgba(0, 0, 0, 0.05);
            display: flex;
            justify-content: center;
            z-index: 100;
        }

        .save-btn {
            width: 100%;
            max-width: 500px;
            background: #e53935;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 999px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(229, 57, 53, 0.25);
        }

        .save-btn:hover {
            background: #c62828;
        }
    </style>
</head>

<body>

    <div class="header-bar">
        <button class="back-btn" onclick="goBackToMap()">
            <svg viewBox="0 0 24 24">
                <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"></path>
            </svg>
        </button>
        <div class="header-title">Enter Address Details</div>
    </div>

    <div class="map-preview-card">
        <div class="map-icon">📍</div>
        <div>
            <div style="font-size:12px; color:#888; font-weight:700; text-transform:uppercase; margin-bottom:2px;">
                Location</div>
            <div id="display-address" class="map-address-text">Loading...</div>
        </div>
    </div>

    <div class="details-container">

        <div class="field-group">
            <label class="field-label">House / Flat / Block No.</label>
            <input type="text" id="delivery-details" class="input-box" placeholder="e.g. Flat 402, Green Valley">
        </div>

        <div class="field-group">
            <label class="field-label">Nearby Landmark (Optional)</label>
            <input type="text" id="delivery-landmark" class="input-box" placeholder="e.g. Near Apollo Hospital">
        </div>

        <div class="field-group">
            <label class="field-label">Save As</label>
            <div class="chip-group">
                <button class="chip-btn" onclick="selectLabel(this, 'Home')">🏠 Home</button>
                <button class="chip-btn" onclick="selectLabel(this, 'Work')">💼 Work</button>
                <button class="chip-btn active" onclick="selectLabel(this, 'Other')">📍 Other</button>
            </div>
        </div>

        <div class="field-group">
            <label class="field-label">Receiver Details</label>
            <div class="row-group">
                <input type="text" id="receiver-name" class="input-box" placeholder="Name">
                <input type="tel" id="receiver-phone" class="input-box" placeholder="Phone Number">
            </div>
        </div>

        <div class="field-group" style="margin-bottom: 5px;">
            <label class="field-label">Help us find you (Optional)</label>
            <div class="image-upload-box" id="upload-box" onclick="document.getElementById('location-image').click()">
                <div style="font-size:24px; margin-bottom:5px;">📷</div>
                <div style="font-size:13px; color:#666; font-weight:600;">Add photo of your building/door</div>
            </div>
            <img id="image-preview" src="" alt="Preview">
            <input type="file" id="location-image" accept="image/*" style="display:none;" onchange="previewImage(this)">
        </div>

    </div>

    <div class="footer-action">
        <button class="save-btn" onclick="saveAddressAndContinue()">Save Address & Continue</button>
    </div>

    <script>
        let passedLat, passedLng, passedAddress;
        let selectedLabel = 'Other';
        let locationImageBase64 = null;

        window.onload = function () {
            const urlParams = new URLSearchParams(window.location.search);
            passedLat = urlParams.get('lat');
            passedLng = urlParams.get('lng');
            passedAddress = urlParams.get('address');

            if (!passedLat || !passedLng || !passedAddress) {
                alert("Location data missing. Redirecting to map.");
                window.location.href = "address_search.html";
                return;
            }

            document.getElementById('display-address').innerText = decodeURIComponent(passedAddress);
        }

        function goBackToMap() {
            // Pass coords back so it auto-centers on what they had
            window.location.href = `address_search.html?lat=${passedLat}&lng=${passedLng}`;
        }

        function selectLabel(btn, label) {
            document.querySelectorAll('.chip-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedLabel = label;
        }

        function previewImage(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    locationImageBase64 = e.target.result;
                    document.getElementById('image-preview').src = locationImageBase64;
                    document.getElementById('image-preview').style.display = 'block';
                    document.getElementById('upload-box').style.display = 'none';
                }
                reader.readAsDataURL(file);
            }
        }

        function saveAddressAndContinue() {
            const name = document.getElementById('receiver-name').value;
            const phone = document.getElementById('receiver-phone').value;
            const details = document.getElementById('delivery-details').value;
            const landmark = document.getElementById('delivery-landmark').value;

            if (!name || !phone) {
                alert("Please provide the Receiver's Name and Phone Number.");
                return;
            }

            // Combine details precisely
            let addressParts = [];
            if (details) addressParts.push(details);
            if (landmark) addressParts.push(`Landmark: ${landmark}`);
            addressParts.push(decodeURIComponent(passedAddress));

            const fullAddress = addressParts.join(', ');

            const locationData = {
                coords: `${passedLat}, ${passedLng}`,
                address: decodeURIComponent(passedAddress),
                details: details,
                landmark: landmark,
                fullAddress: fullAddress,
                receiverName: name,
                receiverPhone: phone,
                label: selectedLabel,
                isSaved: true,
                locationPhoto: locationImageBase64
            };

            // Save for the Request Help form to pick up
            localStorage.setItem('pending_location', JSON.stringify(locationData));

            // Send back to the main request form!
            window.location.href = 'request.html';
        }
    </script>
</body>

</html>
